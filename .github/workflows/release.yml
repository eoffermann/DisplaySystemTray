name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Publish (single-file, self-contained)
        run: dotnet publish src/DisplaySystemTray -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -o publish

      # Tag names are attacker-influenceable text; route them through env vars so
      # they reach pwsh as data, never as script (${{ }} is textual substitution).
      - name: Package
        shell: pwsh
        env:
          TAG: ${{ github.ref_name }}
        run: Compress-Archive -Path publish/* -DestinationPath "DisplaySystemTray-$env:TAG-win-x64.zip"

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release create $env:TAG (Get-Item DisplaySystemTray-*.zip) --generate-notes --verify-tag
