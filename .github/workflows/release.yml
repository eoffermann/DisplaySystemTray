name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish (single-file, self-contained)
        run: dotnet publish src/DisplaySystemTray -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -o publish

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath "DisplaySystemTray-${{ github.ref_name }}-win-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: DisplaySystemTray-*.zip
          generate_release_notes: true
